name: Feature request
description: Suggest a capability or change
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain are you running into? Skip the proposed solution for now.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Sketch of how this could work. Drop CLI examples or YAML mockups if you have them.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds, related tools, or other framings you've thought about.

  - type: checkboxes
    id: scope
    attributes:
      label: In-scope check
      description: This project is intentionally narrow. See the "What's NOT in v0.1" section in the README before filing.
      options:
        - label: I've read the "What's NOT in v0.1" list in the README and this request is not on it
          required: true

version: 2

project_name: skil-lock

before:
  hooks:
    - go mod tidy

builds:
  - id: skil-lock
    main: ./cmd/skil-lock
    binary: skil-lock
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: skil-lock
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Software Bill of Materials, one per archive. Requires syft on the runner
# (the release workflow installs it).
sboms:
  - artifacts: archive

# Keyless cosign signature over checksums.txt. Because checksums.txt already
# covers every artifact, signing it transitively authenticates them all.
# Produces checksums.txt.sig + checksums.txt.pem next to the manifest.
# Requires `id-token: write` in the release workflow (OIDC) and cosign on the
# runner; see SECURITY.md for the verification command.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^docs:"

release:
  prerelease: auto
  draft: false
  github:
    owner: skills-lock
    name: skil-lock
